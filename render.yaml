services:
  - type: web
    name: documind-api
    runtime: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: EMBEDDING_PROVIDER
        sync: false
      - key: VECTOR_STORE
        sync: false
      - key: LLM_PROVIDER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MONGODB_URI
        sync: false
